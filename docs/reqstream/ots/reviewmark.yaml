---
# ReviewMark OTS Software Requirements
#
# Requirements for the ReviewMark file review tool functionality.

sections:
  - title: OTS Software Requirements
    sections:
      - title: ReviewMark Requirements
        requirements:
          - id: Template-OTS-ReviewMark-Plan
            title: ReviewMark shall generate a review plan from the review configuration.
            justification: |
              DemaConsulting.ReviewMark reads the .reviewmark.yaml configuration and the review
              evidence store to produce a review plan documenting file review coverage and currency.
              It runs in the same CI pipeline that produces the TRX test results, so a successful
              pipeline run is evidence that ReviewMark executed without error.
            tags: [ots]
            tests:
              - ReviewMark_ReviewPlanGeneration

          - id: Template-OTS-ReviewMark-Report
            title: ReviewMark shall generate a review report from the review configuration.
            justification: |
              DemaConsulting.ReviewMark reads the .reviewmark.yaml configuration and the review
              evidence store to produce a review report documenting file review coverage and currency.
              It runs in the same CI pipeline that produces the TRX test results, so a successful
              pipeline run is evidence that ReviewMark executed without error.
            tags: [ots]
            tests:
              - ReviewMark_ReviewReportGeneration
