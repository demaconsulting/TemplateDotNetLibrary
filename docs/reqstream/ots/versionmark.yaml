---
# VersionMark OTS Software Requirements
#
# Requirements for the VersionMark version tracking tool functionality.

sections:
  - title: OTS Software Requirements
    sections:
      - title: VersionMark Requirements
        requirements:
          - id: Template-OTS-VersionMark
            title: VersionMark shall publish captured tool-version information.
            justification: |
              DemaConsulting.VersionMark reads version metadata for each dotnet tool used in the
              pipeline and writes a versions markdown document included in the release artifacts.
              It runs in the same CI pipeline that produces the TRX test results, so a successful
              pipeline run is evidence that VersionMark executed without error.
            tags: [ots]
            tests:
              - VersionMark_CapturesVersions
              - VersionMark_GeneratesMarkdownReport
          - id: Template-OTS-VersionMark-Lint
            title: VersionMark shall validate its configuration file and report errors for invalid input.
            justification: |
              DemaConsulting.VersionMark provides a lint mode that checks the .versionmark.yaml
              configuration for structural and semantic errors. Running lint mode in CI provides early
              detection of misconfigurations before capture-and-publish steps execute.
            tags: [ots]
            tests:
              - VersionMark_LintPassesForValidConfig
              - VersionMark_LintReportsErrorsForInvalidConfig
