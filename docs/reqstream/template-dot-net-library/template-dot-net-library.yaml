---
# Software System Requirements for Template DotNet Library
#
# These requirements describe the externally visible behavior of the library
# from the perspective of its consumers, without specifying implementation details.

sections:
  - title: Library API
    requirements:
      - id: Template-Lib-Greeting
        title: The library shall provide a method to generate a greeting.
        justification: |
          Provides a simple demonstration of library functionality following
          .NET library best practices for DEMA Consulting libraries.
        children:
          - Template-Demo-Greeting
        tests:
          - TemplateDotNetLibrary_SystemIntegration_DefaultConstruction_ReturnsExpectedGreeting

      - id: Template-Lib-CustomPrefix
        title: The library shall support a customizable greeting prefix.
        justification: |
          Consumers may need to produce greetings with a prefix other than the
          default, so the library must allow the prefix to be specified at
          construction time.
        children:
          - Template-Demo-Prefix
        tests:
          - TemplateDotNetLibrary_SystemCustomization_CustomPrefix_ReturnsExpectedGreeting

      - id: Template-Lib-ValidationNull
        title: The library shall reject null arguments with ArgumentNullException.
        justification: |
          Null-safety is a fundamental API contract: passing null to the constructor or to
          DemoMethod is a programming error. Throwing ArgumentNullException for null arguments
          immediately surfaces the mistake to callers and prevents obscure failures deeper in
          the call stack.
        children:
          - Template-Demo-ValidationNull
        tests:
          - TemplateDotNetLibrary_SystemValidation_DemoMethodNullInput_ThrowsArgumentNullException
          - TemplateDotNetLibrary_SystemValidation_ConstructorNullPrefix_ThrowsArgumentNullException

      - id: Template-Lib-ValidationEmpty
        title: The library shall reject empty-string arguments with ArgumentException.
        justification: |
          Non-empty validation is a fundamental API contract: passing an empty string to the
          constructor or to DemoMethod is a programming error. Throwing ArgumentException for
          empty-string arguments immediately surfaces the mistake to callers and prevents
          malformed output such as ", World!" or "Hello, !".
        children:
          - Template-Demo-ValidationEmpty
        tests:
          - TemplateDotNetLibrary_SystemValidation_DemoMethodEmptyInput_ThrowsArgumentException
          - TemplateDotNetLibrary_SystemValidation_ConstructorEmptyPrefix_ThrowsArgumentException
