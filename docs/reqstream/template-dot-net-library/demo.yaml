---
# Software Unit Requirements for Demo
#
# These requirements describe the design-level behavior of the Demo unit.

sections:
  - title: Demo Unit
    requirements:
      - id: Template-Demo-Greeting
        title: The Demo class shall return a greeting in the format "{prefix}, {name}!".
        justification: |
          The greeting format is the core contract of the Demo unit: combining the
          stored prefix with the caller-supplied name in a predictable, testable format.
        tests:
          - Demo_DemoMethod_DefaultPrefix_ReturnsGreeting
          - Demo_DemoMethod_CustomPrefix_ReturnsGreeting

      - id: Template-Demo-DefaultPrefix
        title: The Demo class shall use "Hello" as the default greeting prefix.
        justification: |
          Callers constructing Demo without a prefix argument rely on a predictable default.
          The constant DefaultPrefix exposes this value so dependents can reference it
          symbolically rather than hard-coding the string "Hello".
        tests:
          - Demo_DefaultPrefix_Read_IsHello
          - Demo_DefaultConstructor_WithNoArgs_SetsDefaultPrefix

      - id: Template-Demo-Prefix
        title: The Demo class shall allow callers to read the configured greeting prefix.
        justification: |
          Exposing the prefix as a read-only property allows callers to inspect the
          configured prefix without resorting to reflection or other indirect means.
        tests:
          - Demo_Prefix_WithCustomConstruction_ReturnsCustomPrefix
          - Demo_DefaultConstructor_WithNoArgs_SetsDefaultPrefix

      - id: Template-Demo-ValidationNull-DemoMethod
        title: The Demo class shall reject a null name argument to DemoMethod with ArgumentNullException.
        justification: |
          Null-safety is a fundamental contract: DemoMethod must throw ArgumentNullException
          for a null name argument to immediately surface the programming error to callers.
        tests:
          - Demo_DemoMethod_NullInput_ThrowsArgumentNullException

      - id: Template-Demo-ValidationNull-Constructor
        title: The Demo class shall reject a null prefix argument to the constructor with ArgumentNullException.
        justification: |
          Null-safety is a fundamental contract: the custom-prefix constructor must throw
          ArgumentNullException for a null prefix argument to immediately surface the
          programming error to callers.
        tests:
          - Demo_Constructor_NullPrefix_ThrowsArgumentNullException

      - id: Template-Demo-ValidationEmpty-DemoMethod
        title: The Demo class shall reject an empty-string name argument to DemoMethod with ArgumentException.
        justification: |
          Non-empty validation is a fundamental contract: DemoMethod must throw ArgumentException
          for an empty-string name argument to prevent malformed output such as "Hello, !".
        tests:
          - Demo_DemoMethod_EmptyInput_ThrowsArgumentException

      - id: Template-Demo-ValidationEmpty-Constructor
        title: The Demo class shall reject an empty-string prefix argument to the constructor with ArgumentException.
        justification: |
          Non-empty validation is a fundamental contract: the custom-prefix constructor must throw
          ArgumentException for an empty-string prefix argument to prevent malformed output
          such as ", World!".
        tests:
          - Demo_Constructor_EmptyPrefix_ThrowsArgumentException
