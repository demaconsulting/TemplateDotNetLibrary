# Exclude common build artifacts and dependencies
ignorePaths:
  - node_modules/**
  - .git/**
  - bin/**
  - obj/**
  - .venv/**
  - "*.nupkg"
  - "*.snupkg"
  - "*.dll"
  - "*.exe"
  - "*.trx"
  - "*.spdx.json"
  - package-lock.json
  - yarn.lock
  - AGENT_REPORT_*.md
